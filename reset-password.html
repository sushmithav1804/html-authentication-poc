<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width: 380px;">
        <h3 class="text-center mb-3">Reset Password</h3>

        <form>
            <div class="mb-3">
                <label for="newPassword" class="form-label">Enter New Password</label>
                <div class="input-group">
                    <input type="password" id="newPassword" name="newPassword" class="form-control" placeholder="New password">
                    <button type="button" class="btn btn-outline-secondary" onclick="toggleNewPass()">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <div class="input-group">
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="Confirm password">
                    <button type="button" class="btn btn-outline-secondary" onclick="toggleConfirmPass()">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <a href="index.html" class="btn btn-primary w-100">Update Password</a>
        </form>
    </div>
</div>

<script>
function toggleNewPass() {
    const p = document.getElementById("newPassword");
    p.type = p.type === "password" ? "text" : "password";
}

function toggleConfirmPass() {
    const p = document.getElementById("confirmPassword");
    p.type = p.type === "password" ? "text" : "password";
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
